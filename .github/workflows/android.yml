name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Fix gradle wrapper
      run: |
        # Download full gradle distribution
        rm -rf gradle/ gradlew
        wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip
        unzip -q gradle-8.9-bin.zip
        cp -r gradle-8.9/wrapper/ gradle/
        cp gradle-8.9/bin/gradle ./gradlew
        chmod +x gradlew
        rm -rf gradle-8.9 gradle-8.9-bin.zip

    - name: Run unit tests
      run: ./gradlew testDebugUnitTest

    - name: Run lint
      run: ./gradlew lintDebug

    - name: Build debug APK
      run: ./gradlew assembleDebug

    - name: Upload test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: app/build/reports/tests/testDebugUnitTest/

    - name: Upload lint report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lint-report
        path: app/build/reports/lint-results-debug.html

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
