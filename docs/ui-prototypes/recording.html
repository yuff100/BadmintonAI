<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=375, height=812, initial-scale=1.0">
    <title>BadmintonAI - 录制</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            width: 375px;
            height: 812px;
            overflow: hidden;
            position: relative;
        }
        .camera-view {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            position: relative;
        }
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100px;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
            padding: 50px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .back-btn {
            color: white;
            font-size: 28px;
        }
        .timer {
            background: rgba(229, 57, 53, 0.9);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
        }
        .flash-btn {
            color: white;
            font-size: 24px;
        }
        .guide-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 420px;
            border: 2px dashed rgba(255,255,255,0.5);
            border-radius: 12px;
        }
        .guide-frame::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            border: 2px solid rgba(67, 160, 71, 0.8);
            border-radius: 50%;
        }
        .guide-text {
            position: absolute;
            top: 140px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            padding: 0 40px;
        }
        .silhouette {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 300px;
            opacity: 0.3;
        }
        .silhouette svg {
            width: 100%;
            height: 100%;
        }
        .tips-bar {
            position: absolute;
            bottom: 200px;
            left: 20px;
            right: 20px;
            background: rgba(26, 115, 232, 0.9);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .tips-bar .icon {
            font-size: 20px;
        }
        .tips-bar p {
            color: white;
            font-size: 13px;
            flex: 1;
        }
        .bottom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 180px;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 30px;
        }
        .record-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: white;
            border: 4px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .record-btn-inner {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #e53935;
        }
        .record-btn.recording .record-btn-inner {
            width: 28px;
            height: 28px;
            border-radius: 6px;
        }
        .control-row {
            display: flex;
            gap: 60px;
            align-items: center;
        }
        .control-item {
            color: white;
            text-align: center;
            font-size: 12px;
        }
        .control-item .icon {
            font-size: 24px;
            margin-bottom: 4px;
        }
        .stroke-selector {
            position: absolute;
            bottom: 190px;
            left: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
        }
        .stroke-chip {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
        }
        .stroke-chip.active {
            background: #1a73e8;
        }
    </style>
</head>
<body>
    <div class="camera-view">
        <div class="top-bar">
            <span class="back-btn">‹</span>
            <div class="timer">● 00:05</div>
            <span class="flash-btn">⚡</span>
        </div>
        
        <div class="guide-frame">
            <svg class="silhouette" viewBox="0 0 120 300">
                <ellipse cx="60" cy="30" rx="20" ry="25" fill="white"/>
                <line x1="60" y1="55" x2="60" y2="140" stroke="white" stroke-width="3"/>
                <line x1="60" y1="70" x2="20" y2="120" stroke="white" stroke-width="3"/>
                <line x1="60" y1="70" x2="100" y2="50" stroke="white" stroke-width="3"/>
                <line x1="100" y1="50" x2="115" y2="30" stroke="white" stroke-width="2"/>
                <line x1="60" y1="140" x2="35" y2="220" stroke="white" stroke-width="3"/>
                <line x1="60" y1="140" x2="85" y2="220" stroke="white" stroke-width="3"/>
                <ellipse cx="115" cy="25" rx="15" ry="20" fill="none" stroke="white" stroke-width="1.5"/>
            </svg>
        </div>
        
        <div class="guide-text">请将身体完整置于取景框内<br>保持2-3米拍摄距离</div>
        
        <div class="tips-bar">
            <span class="icon">💡</span>
            <p>侧面角度拍摄效果最佳，确保光线充足</p>
        </div>
        
        <div class="stroke-selector">
            <div class="stroke-chip active">正手高远球</div>
            <div class="stroke-chip">杀球</div>
            <div class="stroke-chip">吊球</div>
            <div class="stroke-chip">发球</div>
            <div class="stroke-chip">网前球</div>
        </div>
        
        <div class="bottom-controls">
            <div class="record-btn recording">
                <div class="record-btn-inner"></div>
            </div>
            <div class="control-row">
                <div class="control-item">
                    <div class="icon">📁</div>
                    <span>相册</span>
                </div>
                <div class="control-item">
                    <div class="icon">🔄</div>
                    <span>翻转</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
